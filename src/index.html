<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyNet</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-logo">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"></path>
            </svg>
          </div>
          <span class="brand-name">EasyNet</span>
        </div>
        <nav class="nav">
          <button class="nav-item active" data-page="home">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>
            <span data-i18n="nav.home">Home</span>
          </button>
          <button class="nav-item" data-page="networks">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="2"/><circle cx="18" cy="18" r="2"/><path d="M8 6h6a4 4 0 0 1 4 4v6"/></svg>
            <span data-i18n="nav.networks">Networks</span>
          </button>
          <button class="nav-item" data-page="devices">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M8 20h8M12 16v4"/></svg>
            <span data-i18n="nav.devices">Devices</span>
          </button>
          <button class="nav-item" data-page="setup">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M5 21h14"/></svg>
            <span data-i18n="nav.setup">Setup</span>
          </button>
          <button class="nav-item" data-page="settings">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.6-2-3.4-2.4 1a7 7 0 0 0-1.7-1L14.5 2h-5l-.3 2.3a7 7 0 0 0-1.7 1l-2.4-1-2 3.4 2 1.6a7 7 0 0 0 0 2l-2 1.6 2 3.4 2.4-1a7 7 0 0 0 1.7 1l.3 2.4h5l.3-2.3a7 7 0 0 0 1.7-1l2.4 1 2-3.4-2-1.6c.1-.3.1-.7.1-1z"/></svg>
            <span data-i18n="nav.settings">Settings</span>
          </button>
          <button class="nav-item" data-page="profile">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
            <span data-i18n="nav.profile">Profile</span>
          </button>
          <button class="nav-item" data-page="about">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/></svg>
            <span data-i18n="nav.about">About</span>
          </button>
        </nav>
      </aside>

      <main class="content">
        <section class="page active" id="page-home">
          <div class="home-wrap">
            <div class="status-icon">
              <svg viewBox="0 0 120 80" width="150" height="100">
                <path id="cloudBody" d="M34 64h54a20 20 0 0 0 2-39.8A28 28 0 0 0 36 22 18 18 0 0 0 34 64z" fill="#e9eaed"/>
                <g id="cloudMark"></g>
              </svg>
            </div>
            <h1 class="status-title" id="statusTitle">Disconnected</h1>
            <p class="status-sub" id="statusSub">You are not connected to any network.</p>
            <button class="connect-btn" id="connectBtn">Connect</button>
            <div class="mode">
              <label class="mode-label" data-i18n="label.network">Network</label>
              <div class="select-wrap">
                <select id="networkSelect"></select>
                <svg class="chev" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
              </div>
            </div>
          </div>
        </section>

        <section class="page" id="page-networks">
          <h2 class="page-title" data-i18n="nav.networks">Networks</h2>
          <div class="join-box">
            <label class="field-label" data-i18n="net.add_title">Add a network</label>
            <div class="join-row"><input id="labelInput" type="text" data-i18n-ph="net.label_ph" /></div>
            <div class="join-row" style="margin-top:8px">
              <input id="idInput" type="text" maxlength="16" data-i18n-ph="net.id_ph" />
              <button id="addBtn" class="small-btn" data-i18n="net.add_btn">Add</button>
            </div>
            <button id="importBtn" class="link-btn" data-i18n="net.import">Import my networks</button>
          </div>
          <div class="join-box">
            <label class="field-label" data-i18n="net.create_title">Create your own network</label>
            <div class="join-row">
              <input id="createInput" type="text" data-i18n-ph="net.create_ph" />
              <button id="createBtn" class="small-btn" data-i18n="net.create_btn">Create</button>
            </div>
          </div>
          <div id="netList" class="net-list"></div>
        </section>

        <section class="page" id="page-devices">
          <h2 class="page-title" data-i18n="dev.title">Devices</h2>
          <div id="devOwner" class="dev-owner"></div>
          <div class="setup-actions">
            <button id="scanBtn" class="small-btn" data-i18n="dev.scan">Scan</button>
            <span id="scanInfo" class="hint" style="margin:0"></span>
          </div>
          <div id="devBody"></div>
        </section>

        <section class="page" id="page-setup">
          <h2 class="page-title" data-i18n="setup.title">Setup</h2>
          <div class="info-row"><span data-i18n="setup.zt">ZeroTier</span><b id="suInstalled">—</b></div>
          <div class="info-row"><span data-i18n="setup.service">Service</span><b id="suRunning">—</b></div>
          <div class="info-row"><span data-i18n="setup.local">Local access</span><b id="suLocal">—</b></div>
          <div class="setup-actions">
            <button id="installBtn" class="small-btn" data-i18n="setup.install_btn">Install ZeroTier</button>
            <button id="grantBtn" class="small-btn" data-i18n="setup.grant">Grant access</button>
            <button id="recheckBtn" class="mini-btn" data-i18n="setup.recheck">Re-check</button>
          </div>
          <p class="hint" data-i18n="setup.note"></p>
        </section>

        <section class="page" id="page-settings">
          <h2 class="page-title" data-i18n="settings.title">Settings</h2>
          <div class="form-group">
            <label class="field-label" data-i18n="settings.language">Language</label>
            <div class="select-wrap">
              <select id="langSelect">
                <option value="en">English</option>
                <option value="ru">Русский</option>
                <option value="uk">Українська</option>
              </select>
              <svg class="chev" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
            </div>
          </div>
          <div class="form-group">
            <label class="field-label" data-i18n="settings.token">API token</label>
            <input id="tokenInput" type="password" data-i18n-ph="settings.token_ph" />
          </div>
          <button id="saveBtn" class="small-btn" data-i18n="settings.save">Save</button>
          <p class="hint" data-i18n="settings.token_note"></p>
        </section>

        <section class="page" id="page-profile">
          <h2 class="page-title" data-i18n="profile.title">Profile</h2>
          <div class="info-row"><span data-i18n="profile.node">Node ID</span><b id="pfNode">—</b></div>
          <div class="info-row"><span data-i18n="profile.status">Service status</span><b id="pfStatus">—</b></div>
          <div class="info-row"><span data-i18n="profile.version">ZeroTier version</span><b id="pfVersion">—</b></div>
        </section>

        <section class="page" id="page-about">
          <h2 class="page-title" data-i18n="about.title">About</h2>
          <p class="about-desc" data-i18n="about.desc"></p>
          <div class="info-row"><span data-i18n="about.app_version">Version</span><b>1.1.0</b></div>
        </section>

        <footer class="footer">
          <span id="toast" class="toast"></span>
          <span class="footer-right">EasyNet 1.1.0</span>
        </footer>
      </main>
    </div>

    <script src="i18n.js"></script>
    <script src="main.js"></script>
  </body>
</html>
